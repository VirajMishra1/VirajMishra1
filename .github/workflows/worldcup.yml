name: worldcup

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: update wc block
        run: python3 scripts/worldcup_update.py

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && exit 0
          git commit -m "wc: refresh model odds and track record"
          git pull --rebase origin main
          git push
